build:
  stage: build
  interruptible: true
  before_script: apk add git # install Git for git-describe
  script:
    - bun ci
    - bun run build
  cache:
    <<: *global-cache
    policy: pull
  artifacts:
    paths:
      - dist/

dockerize:
  stage: dockerize
  rules:
    - if: $CI_COMMIT_TAG || $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH || $CI_COMMIT_REF_NAME =~ /^feature\/.+$/
  dependencies:
    - build
  tags:
    - docker-daemon
  cache: []
  script: |
    DOCKER_TAG="${CI_COMMIT_TAG#v}"
    DOCKER_TAG="${DOCKER_TAG:-latest}"
    echo "Building docker tag '${DOCKER_TAG}'..."
    echo "DOCKER_TAG=${DOCKER_TAG}" > docker-tag.env
    
    echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    docker build -t "$CI_REGISTRY/th-wiki/th-wiki-ui:$DOCKER_TAG" .
    docker push "$CI_REGISTRY/th-wiki/th-wiki-ui:$DOCKER_TAG"
  artifacts:
    reports:
      dotenv: docker-tag.env

deploy-test:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG || $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH || $CI_COMMIT_REF_NAME =~ /^feature\/.+$/
  image: alpine:3.20.2
  script: |
    if [ -z "$DOCKER_TAG" ]; then
      echo "Error: DOCKER_TAG is not defined. Previous dockerize step should have set that."
      exit 1
    fi
    echo "Deploying docker image version '${DOCKER_TAG}'..."
    
    apk add openssh
    mkdir -p ~/.ssh
    cp "$SSH_KNOWN_HOSTS" ~/.ssh/known_hosts
    chmod 600 "$SSH_PRIVATE_KEY"
    
    ssh -i "$SSH_PRIVATE_KEY" "$SSH_LOGIN" sh -s <<SSHCOMMANDS
      cd $DOCKER_DIRECTORY_TEST && \
      sed -i 's|\(image: '"${CI_REGISTRY}"'/th-wiki/th-wiki-ui:\).*|\1'"${DOCKER_TAG}"'|' docker-compose.yml && \
      docker compose pull && \
      docker compose up -d
    SSHCOMMANDS
  cache: []

deploy-prod:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG || $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  image: alpine:3.20.2
  script: |
    if [ -z "$DOCKER_TAG" ]; then
      echo "Error: DOCKER_TAG is not defined. Previous dockerize step should have set that."
      exit 1
    fi
    echo "Deploying docker image version '${DOCKER_TAG}'..."
    
    apk add openssh
    mkdir -p ~/.ssh
    cp "$SSH_KNOWN_HOSTS" ~/.ssh/known_hosts
    chmod 600 "$SSH_PRIVATE_KEY"
    
    ssh -i "$SSH_PRIVATE_KEY" "$SSH_LOGIN" sh -s <<SSHCOMMANDS
      cd $DOCKER_DIRECTORY_PROD && \
      sed -i 's|\(image: '"${CI_REGISTRY}"'/th-wiki/th-wiki-ui:\).*|\1'"${DOCKER_TAG}"'|' docker-compose.yml && \
      docker compose pull && \
      docker compose up -d
    SSHCOMMANDS
  cache: []
  when: manual

release-codeberg:
  stage: release
  rules:
    - if: $CI_COMMIT_TAG
  image: alpine:3.20.2
  script: |
    if [ -z "$DOCKER_TAG" ]; then
      echo "Error: DOCKER_TAG is not defined. Previous dockerize step should have set that."
      exit 1
    fi
    echo "Releasing version '${DOCKER_TAG}' to Codeberg..."
    
    apk add curl git jq python3 skopeo
    
    echo "Pushing Git repository..."
    git push https://thehacker:${CODEBERG_TOKEN}@codeberg.org/thehacker/th-wiki-ui.git HEAD:master
    git push https://thehacker:${CODEBERG_TOKEN}@codeberg.org/thehacker/th-wiki-ui.git refs/tags/${CI_COMMIT_TAG}
    
    DOCKER_TAG_REMOTE="codeberg.org/thehacker/th-wiki-ui:${DOCKER_TAG}"
    echo "Pushing Docker image ${DOCKER_TAG_REMOTE}..."
    skopeo copy \
      --src-creds "$CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD" \
      --dest-creds "thehacker:$CODEBERG_TOKEN" \
      "docker://$CI_REGISTRY/th-wiki/th-wiki-ui:$DOCKER_TAG" "docker://$DOCKER_TAG_REMOTE"
    
    VERSION="${DOCKER_TAG}"
    echo "Generating changelog for version ${VERSION}..."
    CHANGELOG="$(python3 scripts/generate_changelog.py changelog.json --version ${VERSION})"

    RELEASE_NAME=$(echo "$CHANGELOG" | head -n1)
    RELEASE_BODY=$(echo "$CHANGELOG" | tail -n +3)
    echo "Name for version ${VERSION} is \"${RELEASE_NAME}\"."
    
    echo "Creating release on Codeberg for version ${VERSION}..."
    REQUEST=$(
      jq \
        -n \
        --arg tag_name "v${VERSION}" \
        --arg name "$RELEASE_NAME" \
        --arg body "$RELEASE_BODY" \
        '{tag_name: $tag_name, name: $name, body: $body}'
    )
    
    curl \
      -L \
      -X POST \
      -H "Accept: application/json" \
      -H "Content-Type: application/json" \
      -H "Authorization: token ${CODEBERG_TOKEN}" \
      "https://codeberg.org/api/v1/repos/thehacker/th-wiki-ui/releases" \
      -d "${REQUEST}"
    
    echo "Released version ${VERSION} successfully to Codeberg."
  cache: []
  when: manual

release-github:
  stage: release
  rules:
    - if: $CI_COMMIT_TAG
  image: alpine:3.20.2
  script: |
    if [ -z "$DOCKER_TAG" ]; then
      echo "Error: DOCKER_TAG is not defined. Previous dockerize step should have set that."
      exit 1
    fi
    echo "Releasing version '${DOCKER_TAG}' to GitHub..."
    
    apk add curl git jq python3 skopeo
    
    echo "Pushing Git repository..."
    git push https://thehacker:${GITHUB_TOKEN}@github.com/thehacker/th-wiki-ui.git HEAD:master
    git push https://thehacker:${GITHUB_TOKEN}@github.com/thehacker/th-wiki-ui.git refs/tags/${CI_COMMIT_TAG}
    
    DOCKER_TAG_REMOTE="ghcr.io/thehacker/th-wiki-ui:${DOCKER_TAG}"
    echo "Pushing Docker image ${DOCKER_TAG_REMOTE}..."
    skopeo copy \
      --src-creds "$CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD" \
      --dest-creds "thehacker:$GITHUB_TOKEN" \
      "docker://$CI_REGISTRY/th-wiki/th-wiki-ui:$DOCKER_TAG" "docker://$DOCKER_TAG_REMOTE"
    
    VERSION="${DOCKER_TAG}"
    echo "Generating changelog for version ${VERSION}..."
    CHANGELOG="$(python3 scripts/generate_changelog.py changelog.json --version ${VERSION})"

    RELEASE_NAME=$(echo "$CHANGELOG" | head -n1)
    RELEASE_BODY=$(echo "$CHANGELOG" | tail -n +3)
    echo "Name for version ${VERSION} is \"${RELEASE_NAME}\"."
    
    echo "Creating release on GitHub for version ${VERSION}..."
    REQUEST=$(
      jq \
        -n \
        --arg tag_name "v${VERSION}" \
        --arg name "$RELEASE_NAME" \
        --arg body "$RELEASE_BODY" \
        '{tag_name: $tag_name, name: $name, body: $body}'
    )
    
    curl \
      -L \
      -X POST \
      -H "Accept: application/vnd.github+json" \
      -H "Authorization: Bearer ${GITHUB_TOKEN}" \
      -H "X-GitHub-Api-Version: 2026-03-10" \
      "https://api.github.com/repos/thehacker/th-wiki-ui/releases" \
      -d "${REQUEST}"
    
    echo "Released version ${VERSION} successfully to GitHub."
  cache: []
  when: manual
