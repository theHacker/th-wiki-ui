workflow:
  auto_cancel:
    on_new_commit: conservative

variables:
  GIT_DEPTH: 0 # Disable shallow clone, so git-describe works for our version detection, and releases can push the full repo

default:
  image: oven/bun:1.3.5-alpine
  cache: &global-cache
    key: "$CI_COMMIT_REF_NAME"
    paths:
      - node_modules

stages:
  - setup
  - test
  - build
  - dockerize
  - deploy
  - release

setup:
  stage: setup
  interruptible: true
  script: bun ci
  cache:
    <<: *global-cache
    policy: push

lint:
  stage: test
  interruptible: true
  script:
    - bun ci
    - bun run lint
  cache:
    <<: *global-cache
    policy: pull

test:
  stage: test
  interruptible: true
  script:
    - bun ci
    - bun test
  cache:
    <<: *global-cache
    policy: pull

